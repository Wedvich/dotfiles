setw -g aggressive-resize on

# Modify key bindings
bind C-Down split-window -v -c "#{pane_current_path}"
bind C-Up split-window -vb -c "#{pane_current_path}"
bind C-Right split-window -h -c "#{pane_current_path}"
bind C-Left split-window -hb -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind-key b run-shell 'tmux switch-client -l'

# Turn off sounds
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off

# Bell notification for tools needing attention
set -g monitor-bell on
set -g bell-action other

# Enable mouse
set -g mouse on
setw -g mode-keys vi
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Show terminal window title
set-option -g set-titles on
set-option -g set-titles-string '#{pane_current_path} → #{window_name}'

set-option -g window-status-format '#{b:pane_current_path}:#W#{?window_bell_flag,*,}'
set-option -g window-status-current-format '#{b:pane_current_path}:#W#{?window_bell_flag,*,}'

# 24-bit truecolor support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",*:Tc"

# Extended keys (enables Shift+Enter passthrough for Claude Code, etc.)
set -s extended-keys on
set -sa terminal-features 'tmux-256color:extkeys'

source ~/.tmux.snazzy.theme
