# tmux.conf — one window per task, minimal status bar (Option B)
#
# Workflow:
#   prefix + c     → new window (inherits directory)
#   prefix + T     → label current window with task/issue ID
#   prefix + N     → new window + immediate label prompt
#
# Window naming:
#   Unlabeled windows auto-show directory basename (e.g. "appfarm").
#   Once you label a window (e.g. "AUTH-142"), the label sticks.
#
# Bell:
#   Claude Code rings the bell when waiting for input.
#   Other windows show a pink ● in their tab.

# ─── Terminal ─────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",*:Tc"
set -s extended-keys on
set -sa terminal-features 'tmux-256color:extkeys'

# ─── General ──────────────────────────────────────────────────

setw -g aggressive-resize on
set -g mouse on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Window naming ────────────────────────────────────────────

# Auto-name from directory. Manual rename (prefix+T) turns this off per-window.
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g allow-rename off

# ─── Notifications ────────────────────────────────────────────

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g monitor-bell on
set -g bell-action other

# ─── Status bar ───────────────────────────────────────────────

set -g status-interval 5
set -g status-justify left

set -g status-left ''
set -g status-left-length 0

# Right: ssh indicator (cyan) + path (dimmed) + git branch (pink)
set -g status-right '#($HOME/.tmux-status-right.sh "#{pane_pid}" "#{pane_current_path}")'
set -g status-right-length 80

# Window tabs: "index:name" with bell indicator
set -g window-status-format ' #I:#W#{?window_bell_flag, ●,} '
set -g window-status-current-format ' #I:#W '
set -g window-status-separator ''

# ─── Terminal title (feeds Ghostty/Windows Terminal title bar) ─

set -g set-titles on
set -g set-titles-string '#W'

# ─── Copy mode ────────────────────────────────────────────────

# Auto-detect clipboard: macOS → pbcopy, WSL2 → clip.exe
unbind -T copy-mode-vi Enter
if-shell "command -v pbcopy" {
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"
}

# ─── Key bindings ─────────────────────────────────────────────

# Splits (inherit current path — all panes stay in the same working context)
bind C-Down  split-window -v  -c "#{pane_current_path}"
bind C-Up    split-window -vb -c "#{pane_current_path}"
bind C-Right split-window -h  -c "#{pane_current_path}"
bind C-Left  split-window -hb -c "#{pane_current_path}"

# Windows
bind c new-window -c "#{pane_current_path}"
bind b switch-client -l

# Task labeling
bind t command-prompt -p "Task:" "rename-window '%%'"

# New task: create window + immediately prompt for label
bind N new-window -c "#{pane_current_path}" \; command-prompt -p "Task:" "rename-window '%%'"

# ─── Theme ────────────────────────────────────────────────────

source ~/.tmux.snazzy.theme
